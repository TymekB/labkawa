server {
    listen 80;
    server_name labkawa.pl www.labkawa.pl;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed build assets aggressively (filenames contain content hashes)
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: every unknown path falls back to index.html (Angular router handles it)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
