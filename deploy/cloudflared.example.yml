# Cloudflare Tunnel config — wystawia labkawa.pl bez otwierania portu 80/443 na Mikrusie.
# Skopiuj do ~/.cloudflared/config.yml i podmień <TUNNEL_ID>.
#
# Wcześniej:
#   cloudflared tunnel login
#   cloudflared tunnel create labkawa
#   cloudflared tunnel route dns labkawa labkawa.pl
#   cloudflared tunnel route dns labkawa www.labkawa.pl

tunnel: <TUNNEL_ID>
credentials-file: /root/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: labkawa.pl
    service: http://localhost:8080
  - hostname: www.labkawa.pl
    service: http://localhost:8080
  - service: http_status:404
